name: Release

# Cut a release by pushing a version tag, e.g.:
#     git tag v0.1.0 && git push origin v0.1.0
# The tag MUST match the version in pyproject.toml (single source of truth).
# You can also run this manually from the Actions tab and supply a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Created if it does not exist."
        required: true

# Needed for `gh release create` to push the release/tag.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve tag
        shell: bash
        env:
          # Pass the dispatch input via env (never interpolate ${{ }} into the
          # script body) so a crafted tag can't inject shell into a signing job.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v[0-9]*) : ;;  # expected shape
            *) echo "::error::Refusing tag '$TAG' (must look like v1.2.3)"; exit 1 ;;
          esac
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Releasing tag: $TAG"

      - name: Install project + tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      - name: Verify tag matches pyproject version
        shell: bash
        run: |
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${TAG#v}"
          echo "tag=$TAG_VER  pyproject=$VER"
          if [ "$TAG_VER" != "$VER" ]; then
            echo "::error::Tag '$TAG_VER' does not match pyproject version '$VER'. Bump the version or fix the tag."
            exit 1
          fi

      - name: Run test suite
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # The offscreen-Qt platform can segfault in C++ destructors during
          # interpreter shutdown AFTER all tests pass, corrupting the exit code.
          # Judge the run by the JUnit results (written before that crash), not
          # by the process exit code.
          set +e
          pytest -q --junitxml=test-results.xml
          set -e
          python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse("test-results.xml").getroot()
          suites = [root] if root.tag == "testsuite" else list(root.iter("testsuite"))
          bad = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
          total = sum(int(s.get("tests", 0)) for s in suites)
          print(f"{total} tests, {bad} failures/errors")
          sys.exit(1 if bad or total == 0 else 0)
          PY

      - name: Build sdist + wheel
        shell: bash
        run: |
          python -m build
          ls -l dist

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: .\installer\build_installer.ps1 -Python python

      - name: Sign installer (only if a cert is configured)
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.SIGNING_PFX_BASE64 }}
          PFX_PW: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if (-not $env:PFX_B64) {
            Write-Host "No SIGNING_PFX_BASE64 secret set — shipping unsigned (this is fine)."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_B64))
          $setup = (Get-ChildItem installer\Output\*.exe | Select-Object -First 1).FullName
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -Last 1).FullName
          & $signtool sign /f $pfx /p $env:PFX_PW /fd sha256 `
            /tr http://timestamp.digicert.com /td sha256 $setup
          if ($LASTEXITCODE -ne 0) { throw "signtool failed" }
          & $signtool verify /pa $setup
          Remove-Item $pfx -Force
          Write-Host "Signed: $setup"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" dist/*.whl dist/*.tar.gz installer/Output/*.exe \
            --title "$TAG" --generate-notes \
            || gh release upload "$TAG" dist/*.whl dist/*.tar.gz installer/Output/*.exe --clobber

  build-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          # On dispatch, GITHUB_REF_NAME is the branch (non-empty), so a `:-`
          # default would wrongly keep the branch — pick by event explicitly.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v[0-9]*) : ;;
            *) echo "::error::Refusing tag '$TAG' (must look like v1.2.3)"; exit 1 ;;
          esac
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -e ".[gui]" "mcp>=1.2.0" "certifi>=2023.0"

      - name: Verify tag matches pyproject version
        shell: bash
        run: |
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG#v}" != "$VER" ]; then
            echo "::error::Tag '${TAG#v}' != pyproject version '$VER'."; exit 1
          fi

      - name: Build native .icns from app.png
        run: |
          if [ -f installer/app.png ]; then
            mkdir -p icon.iconset
            for s in 16 32 64 128 256 512; do
              sips -z $s $s installer/app.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
              d=$((s * 2))
              sips -z $d $d installer/app.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
            done
            iconutil -c icns icon.iconset -o installer/app.icns
            echo "Regenerated installer/app.icns natively."
          fi

      - name: Embed version and build .app
        run: |
          VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          export OBD_VERSION="$VER"
          echo "OBD_VERSION=$VER" >> "$GITHUB_ENV"
          printf '__version__ = "%s"\n' "$VER" > src/vcds_core/_version.py
          pyinstaller installer/vcds_gui_mac.spec --clean --noconfirm
          test -d "dist/OBD Toolkit.app" || { echo "::error::.app not produced"; exit 1; }

      - name: Package .dmg
        run: |
          # hdiutil can intermittently fail with "Resource busy" while Spotlight
          # indexes the freshly-built .app — retry a few times.
          dmg="OBD-Toolkit-$OBD_VERSION.dmg"
          for i in 1 2 3 4; do
            hdiutil create -volname "OBD Toolkit" -srcfolder "dist/OBD Toolkit.app" \
              -ov -format UDZO "$dmg" && break
            echo "hdiutil busy — retry $i"; sleep 10
          done
          test -f "$dmg"

      - name: Upload .dmg to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "OBD-Toolkit-$OBD_VERSION.dmg" --clobber

  build-linux:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v[0-9]*) : ;;
            *) echo "::error::Refusing tag '$TAG' (must look like v1.2.3)"; exit 1 ;;
          esac
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install build deps
        run: |
          sudo apt-get update
          # libfuse2 lets appimagetool run; the xcb libs are Qt runtime deps.
          sudo apt-get install -y libfuse2 libxcb-cursor0 libxcb-xinerama0 libegl1
          python -m pip install --upgrade pip pyinstaller
          pip install -e ".[gui]" "mcp>=1.2.0" "certifi>=2023.0"

      - name: Verify tag matches pyproject version
        shell: bash
        run: |
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG#v}" != "$VER" ]; then
            echo "::error::Tag '${TAG#v}' != pyproject version '$VER'."; exit 1
          fi

      - name: Embed version and build (PyInstaller)
        run: |
          VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "OBD_VERSION=$VER" >> "$GITHUB_ENV"
          printf '__version__ = "%s"\n' "$VER" > src/vcds_core/_version.py
          pyinstaller installer/vcds_gui_linux.spec --clean --noconfirm
          test -x "dist/obd-toolkit/obd-toolkit" || { echo "::error::binary not produced"; exit 1; }

      - name: Assemble AppDir
        run: |
          APP=AppDir
          rm -rf "$APP"
          mkdir -p "$APP/usr/bin"
          cp -a dist/obd-toolkit/. "$APP/usr/bin/"
          # icon (256px) at AppDir root, named to match the .desktop Icon=
          if [ -f installer/app.png ]; then cp installer/app.png "$APP/obd-toolkit.png"; fi
          cat > "$APP/obd-toolkit.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=OBD Toolkit
          Comment=Analyze VCDS logs and capture live OBD-II data
          Exec=obd-toolkit
          Icon=obd-toolkit
          Categories=Utility;Development;
          Terminal=false
          EOF
          cat > "$APP/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          exec "$HERE/usr/bin/obd-toolkit" "$@"
          EOF
          chmod +x "$APP/AppRun"

      - name: Build AppImage
        run: |
          ARCH=$(uname -m)   # x86_64 on the runner
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage"
          chmod +x appimagetool
          out="OBD-Toolkit-${OBD_VERSION}-${ARCH}.AppImage"
          ARCH="$ARCH" ./appimagetool --appimage-extract-and-run AppDir "$out"
          test -f "$out"
          sha256sum "$out" | tee "$out.sha256"

      - name: Upload AppImage to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCH=$(uname -m)
          gh release upload "$TAG" \
            "OBD-Toolkit-${OBD_VERSION}-${ARCH}.AppImage" \
            "OBD-Toolkit-${OBD_VERSION}-${ARCH}.AppImage.sha256" --clobber
